name: 每日自动更新 CCTV 直播源

on:
  schedule:
    # 每天北京时间 6:00, 12:00, 18:00, 23:00 自动运行
    - cron: "0 22 * * *"   # 北京时间 06:00 (UTC+8)
    - cron: "0 4 * * *"    # 北京时间 12:00
    - cron: "0 10 * * *"   # 北京时间 18:00
    - cron: "0 15 * * *"   # 北京时间 23:00
  workflow_dispatch:       # 允许手动触发
  push:
    paths:
      - "scripts/validate_sources.py"  # 脚本更新时触发

jobs:
  update-sources:
    runs-on: ubuntu-latest
    concurrency:
      group: cctv-update
      cancel-in-progress: false  # 不取消正在运行的，排队等待
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行源验证脚本
        run: |
          python scripts/validate_sources.py --timeout 5 --workers 30 --top-n 5

      - name: 检查低源频道
        id: check_health
        run: |
          # 解析验证报告，找出可用源少于 2 的频道
          LOW_CHANNELS=""
          while IFS='|' read -r ch total ok lat status; do
            ch=$(echo "$ch" | xargs)
            ok=$(echo "$ok" | xargs)
            if [ -n "$ok" ] && [ "$ok" -lt 2 ] 2>/dev/null; then
              LOW_CHANNELS="$LOW_CHANNELS $ch(${ok}源)"
            fi
          done < <(grep -E '^\| CCTV-' 验证报告.md)
          if [ -n "$LOW_CHANNELS" ]; then
            echo "⚠️ 低源频道: $LOW_CHANNELS"
            echo "low_channels=$LOW_CHANNELS" >> $GITHUB_OUTPUT
          else
            echo "✅ 所有频道至少有2个可用源"
            echo "low_channels=" >> $GITHUB_OUTPUT
          fi

      - name: 检查是否有更新
        id: check_changes
        run: |
          if git diff --quiet CCTV直播源.m3u 验证报告.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📭 直播源无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📬 检测到直播源更新!"
          fi

      - name: 提交并推送更新
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CCTV直播源.m3u 验证报告.md
          git commit -m "🔄 自动更新: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M') CST"
          # 拉取远程更新，冲突时使用本地版本(最新验证结果优先)
          git pull --rebase -X theirs origin master 2>/dev/null || git rebase --abort 2>/dev/null || true
          git push origin master 2>/dev/null || (git pull --rebase -X theirs origin master && git push origin master)

      - name: 清除 jsDelivr CDN 缓存
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          # 尝试清除 jsDelivr CDN 缓存（非官方接口，不保证 100% 生效；通常 12-24h 自动刷新）
          curl -s -X PURGE "https://cdn.jsdelivr.net/gh/cbbdft/tvbox-cctv-live@master/CCTV直播源.m3u" || true
          echo "🚀 jsDelivr CDN 缓存清除请求已发送"

      - name: 上传验证报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: 验证报告.md
